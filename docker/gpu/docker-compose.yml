# DEV compose file: builds from source, bind-mounts ../../api over /app/api
# (shadowing the model weights baked into the image — hence DOWNLOAD_MODEL=true
# so the container re-downloads them at start). For a production, offline-capable
# pull-and-run setup use docker-compose.prod.yml instead.
name: kokoro-server-gpu
services:
  kokoro-tts:
    # Published image (amd64, cu128 — RTX 3000 through RTX 5000):
    #   image: ghcr.io/forgeguard-ai/kokoro-server-cu128:latest
    # Or build locally from source:
    build:
      context: ../..
      dockerfile: docker/gpu/Dockerfile.optimized
      # cu128 wheels ship sm_86..sm_120 kernels: Ampere (RTX 30xx) through
      # Blackwell (RTX 50xx). For Jetson, use docker/jetson/Dockerfile instead.
    volumes:
      - ../../api:/app/api
    user: "1001:1001"  # Ensure container runs as UID 1001 (appuser)
    ports:
      - "8880:8880"
    environment:
      - PYTHONPATH=/app:/app/api
      - USE_GPU=true
      - PYTHONUNBUFFERED=1
      - API_LOG_LEVEL=DEBUG
      - DOWNLOAD_MODEL=true
      # Set API_KEY to require `Authorization: Bearer <key>` on API requests.
      # Leave unset to keep the server open. Health + web UI stay reachable.
      # - API_KEY=change-me
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
