name: Docs validate

# Validates the documentation publication contract (README, manifest, and the
# docs/ tree). Kept separate from model downloads and GPU tests. Uses only
# GitHub-authored actions, pinned to commit SHAs, per the org Actions policy.

on:
  pull_request:
    paths:
      - README.md
      - .forgeguard/docs.yml
      - docs/**
      - scripts/docs/**
      - .github/workflows/docs-validate.yml
  push:
    branches: [main]
    paths:
      - README.md
      - .forgeguard/docs.yml
      - docs/**
      - scripts/docs/**
      - .github/workflows/docs-validate.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate documentation
        run: python scripts/docs/validate_docs.py

      - name: Check external links (non-blocking)
        continue-on-error: true
        run: python scripts/docs/check_external_links.py
