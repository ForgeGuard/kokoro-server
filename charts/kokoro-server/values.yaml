# Default values for kokoro-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
kokoroTTS:
  replicaCount: 1
  # The name of the deployment repository
  repository: "ghcr.io/forgeguard/kokoro-server"
  imagePullSecrets: [] # Set if using a private image or getting rate limited
  # Defaults to the chart appVersion (a pinned release) when empty.
  tag: ""
  pullPolicy: IfNotPresent
  port: 8880

  # Optional bearer-token auth. When enabled, the API_KEY env var is injected
  # from an existing Secret and clients must send `Authorization: Bearer <key>`
  # on API routes (/health, /ready, and the web console stay open).
  apiKey:
    enabled: false
    existingSecret: ""   # name of the Secret holding the key
    secretKey: "api-key" # key within that Secret

  # Extra environment variables for the container (name/value pairs).
  # e.g. WARMUP_ON_START, API_LOG_LEVEL, DEFAULT_VOICE — see the README.
  extraEnv: []
  #  - name: API_LOG_LEVEL
  #    value: DEBUG

  resources:
    limits:
      nvidia.com/gpu: 1
    requests:
      nvidia.com/gpu: 1

  # Probes wired to the server's health contract:
  #   /health -> 200 as soon as the process serves (also during model warmup)
  #   /ready  -> 200 only once the model is warmed and synthesis will succeed
  probes:
    startup:
      httpGet:
        path: /ready
        port: kokoro-tts-http
      periodSeconds: 5
      failureThreshold: 60 # up to 300s for a cold model load
    liveness:
      httpGet:
        path: /health
        port: kokoro-tts-http
      periodSeconds: 30
      timeoutSeconds: 5
    readiness:
      httpGet:
        path: /ready
        port: kokoro-tts-http
      periodSeconds: 10
      timeoutSeconds: 5

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# The container image runs as a non-root user (uid 1001). These defaults enforce
# that at the pod/container level and drop all Linux capabilities. fsGroup makes
# any mounted volume group-writable by that uid.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # readOnlyRootFilesystem requires a writable mount for OUTPUT_DIR/temp files;
  # enable per-environment alongside such a volume.
  # readOnlyRootFilesystem: true

service:
  type: ClusterIP

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # external-dns.alpha.kubernetes.io/hostname: kokoro.example.com
    # external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
  hosts:
    - host: kokoro.example.com
      paths:
        - path: /
          pathType: Prefix

  tls: []
  #  - secretName: kokoro-server-tls
  #    hosts:
  #      - kokoro.example.com

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
